<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">Two stylized pose skeletons</title>
  <desc id="desc">Two OpenPose-inspired template skeletons in different poses for the quick guide header.</desc>
  <defs>
    <linearGradient id="wash" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffaf2"/>
      <stop offset="100%" stop-color="#f6ecdf"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#18222d" flood-opacity="0.14"/>
    </filter>
    <style>
      .frame { fill: url(#wash); stroke: rgba(24,34,45,0.08); }
      .halo-left { fill: #efd4b7; opacity: 0.75; }
      .halo-right { fill: #d9eee9; opacity: 0.9; }
      .joint-left, .joint-right { stroke: #fffaf2; stroke-width: 4; }
      .bone-left, .bone-right { fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-width: 10; }
      .bone-left { stroke: #a3472f; }
      .joint-left { fill: #a3472f; }
      .bone-right { stroke: #2f6c63; }
      .joint-right { fill: #2f6c63; }
    </style>
  </defs>

  <g filter="url(#softShadow)">
    <rect class="frame" x="18" y="20" width="604" height="380" rx="30"/>
  </g>

  <ellipse class="halo-left" cx="188" cy="220" rx="156" ry="164"/>
  <ellipse class="halo-right" cx="456" cy="220" rx="156" ry="164"/>
  <g aria-label="Neutral skeleton" transform="translate(10 -8)">
